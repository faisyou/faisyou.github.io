<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>SOTA Models · Parameter Scaling Over Time</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #f4eedd; }
  * { box-sizing: border-box; }
  #root { width: 100%; }
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const MODELS = [
  { name: "GPT-4",             provider: "OpenAI",    params: 1760, active: null, arch: "MoE",   date: "2023-03-14", estimated: true },
  { name: "Claude 2",          provider: "Anthropic", params: 130,  active: 130,  arch: "Dense", date: "2023-07-11", estimated: true },
  { name: "Llama 2 70B",       provider: "Meta",      params: 70,   active: 70,   arch: "Dense", date: "2023-07-18", estimated: false },
  { name: "GPT-4 Turbo",       provider: "OpenAI",    params: 1760, active: null, arch: "MoE",   date: "2023-11-06", estimated: true },
  { name: "Gemini 1.0 Pro",    provider: "Google",    params: 540,  active: 540,  arch: "Dense", date: "2023-12-06", estimated: true },
  { name: "Gemini 1.5 Pro",    provider: "Google",    params: 1500, active: null, arch: "MoE",   date: "2024-02-15", estimated: true },
  { name: "Claude 3 Opus",     provider: "Anthropic", params: 2000, active: null, arch: "MoE",   date: "2024-03-04", estimated: true },
  { name: "Llama 3 70B",       provider: "Meta",      params: 70,   active: 70,   arch: "Dense", date: "2024-04-18", estimated: false },
  { name: "GPT-4o",            provider: "OpenAI",    params: 200,  active: null, arch: "MoE",   date: "2024-05-13", estimated: true },
  { name: "Claude 3.5 Sonnet", provider: "Anthropic", params: 400,  active: null, arch: "MoE",   date: "2024-06-20", estimated: true },
  { name: "Llama 3.1 405B",    provider: "Meta",      params: 405,  active: 405,  arch: "Dense", date: "2024-07-23", estimated: false },
  { name: "Gemini 2.0 Flash",  provider: "Google",    params: 200,  active: null, arch: "MoE",   date: "2024-12-11", estimated: true },
  { name: "DeepSeek V3",       provider: "DeepSeek",  params: 671,  active: 37,   arch: "MoE",   date: "2024-12-26", estimated: false },
  { name: "DeepSeek R1",       provider: "DeepSeek",  params: 671,  active: 37,   arch: "MoE",   date: "2025-01-20", estimated: false },
  { name: "Claude 3.7 Sonnet", provider: "Anthropic", params: 500,  active: null, arch: "MoE",   date: "2025-02-24", estimated: true },
  { name: "GPT-4.5",           provider: "OpenAI",    params: 3000, active: null, arch: "MoE",   date: "2025-02-27", estimated: true },
  { name: "Gemini 2.5 Pro",    provider: "Google",    params: 1800, active: null, arch: "MoE",   date: "2025-03-25", estimated: true },
  { name: "Llama 4 Scout",     provider: "Meta",      params: 109,  active: 17,   arch: "MoE",   date: "2025-04-05", estimated: false },
  { name: "Llama 4 Maverick",  provider: "Meta",      params: 400,  active: 17,   arch: "MoE",   date: "2025-04-05", estimated: false },
  { name: "GPT-4.1",           provider: "OpenAI",    params: 1500, active: null, arch: "MoE",   date: "2025-04-14", estimated: true },
  { name: "Claude Opus 4",     provider: "Anthropic", params: 2000, active: null, arch: "MoE",   date: "2025-05-22", estimated: true },
  { name: "Qwen3-Coder 480B",  provider: "Alibaba",   params: 480,  active: 35,   arch: "MoE",   date: "2025-07-22", estimated: false },
  { name: "GPT-5",             provider: "OpenAI",    params: 2500, active: null, arch: "MoE",   date: "2025-08-07", estimated: true },
  { name: "Claude Opus 4.5",   provider: "Anthropic", params: 2000, active: null, arch: "MoE",   date: "2025-11-24", estimated: true },
  { name: "Gemini 3 Pro",      provider: "Google",    params: 2200, active: null, arch: "MoE",   date: "2026-01-15", estimated: true },
  { name: "Kimi K2.5",          provider: "Moonshot",  params: 1000, active: 32,   arch: "MoE",   date: "2026-01-27", estimated: false },
  { name: "GPT-5.2",           provider: "OpenAI",    params: 2800, active: null, arch: "MoE",   date: "2026-02-10", estimated: true },
  { name: "GPT-5.4",           provider: "OpenAI",    params: 3000, active: null, arch: "MoE",   date: "2026-03-05", estimated: true },
  { name: "Claude Opus 4.6",   provider: "Anthropic", params: 2000, active: null, arch: "MoE",   date: "2026-03-13", estimated: true },
  { name: "Claude Sonnet 4.6", provider: "Anthropic", params: 600,  active: null, arch: "MoE",   date: "2026-03-13", estimated: true },
  { name: "Gemini 3.1 Pro",    provider: "Google",    params: 2400, active: null, arch: "MoE",   date: "2026-03-20", estimated: true },
  { name: "Gemma 4 31B",       provider: "Google",    params: 31,   active: 31,   arch: "Dense", date: "2026-04-02", estimated: false },
  { name: "GLM-5.1",           provider: "Zhipu",     params: 744,  active: 40,   arch: "MoE",   date: "2026-04-07", estimated: false },
  { name: "Claude Mythos",     provider: "Anthropic", params: 2500, active: null, arch: "MoE",   date: "2026-04-07", estimated: true },
  { name: "Qwen 3.6-Plus",     provider: "Alibaba",   params: 600,  active: 40,   arch: "MoE",   date: "2026-04-08", estimated: true },
  { name: "GPT-6",             provider: "OpenAI",    params: 3500, active: null, arch: "MoE",   date: "2026-04-14", estimated: true },
  { name: "Claude Opus 4.7",   provider: "Anthropic", params: 2100, active: null, arch: "MoE",   date: "2026-04-15", estimated: true },
];

const PROVIDER_COLORS = {
  OpenAI: "#10a37f", Anthropic: "#cc7d5c", Google: "#4285f4", Meta: "#7c5fd3",
  DeepSeek: "#e8b84a", Alibaba: "#d94e4e", Moonshot: "#2d6cdf", Zhipu: "#b84d8a",
};

const LABELED = new Set([
  "GPT-4", "Llama 2 70B", "Llama 3.1 405B", "GPT-4.5", "GPT-5", "GPT-6",
  "Claude Opus 4.7", "Llama 4 Scout", "DeepSeek V3", "Gemma 4 31B",
  "Gemini 1.5 Pro", "Kimi K2.5", "GLM-5.1",
]);

const parseDate = (s) => new Date(s + "T00:00:00Z").getTime();
const formatParams = (p) => (p >= 1000 ? `${(p / 1000).toFixed(1)}T` : `${p}B`);

function Chart() {
  const W = 980, H = 620;
  const M = { t: 60, r: 220, b: 90, l: 90 };
  const plotW = W - M.l - M.r;
  const plotH = H - M.t - M.b;

  const tMin = parseDate("2023-01-01");
  const tMax = parseDate("2026-05-01");
  const xScale = (ms) => M.l + ((ms - tMin) / (tMax - tMin)) * plotW;

  const yMin = Math.log10(10);
  const yMax = Math.log10(5000);
  const yScale = (p) => M.t + plotH - ((Math.log10(p) - yMin) / (yMax - yMin)) * plotH;

  const yTicks = [10, 30, 100, 300, 1000, 3000];
  const yearTicks = ["2023", "2024", "2025", "2026"];
  const quarterTicks = [];
  for (const y of [2023, 2024, 2025, 2026]) {
    for (const m of [1, 4, 7, 10]) {
      const d = new Date(Date.UTC(y, m - 1, 1)).getTime();
      if (d >= tMin && d <= tMax) quarterTicks.push(d);
    }
  }

  const sortedByDate = [...MODELS].sort((a, b) => parseDate(a.date) - parseDate(b.date));
  const totalFrontier = [];
  let bestTotal = 0;
  for (const m of sortedByDate) {
    if (m.params > bestTotal) {
      bestTotal = m.params;
      totalFrontier.push({ date: parseDate(m.date), params: m.params, name: m.name });
    }
  }

  return (
    <div style={styles.root}>
      <div style={styles.header}>
        <div style={styles.kicker}>FIGURE 02 · PARAMETER SCALING, 2023–2026</div>
        <h1 style={styles.title}>
          The parameter race <span style={styles.titleItalic}>bent, didn't break</span>
        </h1>
        <p style={styles.subtitle}>
          Total parameter counts of frontier language models over time. Log Y-axis.
          Filled circles = dense architectures. Open circles = Mixture-of-Experts
          (where active parameters per token are a small fraction of total).
          Dashed line traces the running maximum.
        </p>
      </div>

      <div style={styles.chartWrap}>
        <svg viewBox={`0 0 ${W} ${H}`} style={styles.svg}>
          <rect x={M.l} y={M.t} width={plotW} height={plotH} fill="#faf6ec" stroke="#2a2a2a" strokeWidth="1.2" />

          {yTicks.map((t) => (
            <line key={`yg-${t}`} y1={yScale(t)} y2={yScale(t)} x1={M.l} x2={M.l + plotW} stroke="#e0d9c6" strokeWidth="0.5" strokeDasharray="2 3" />
          ))}
          {quarterTicks.map((d) => (
            <line key={`xg-${d}`} x1={xScale(d)} x2={xScale(d)} y1={M.t} y2={M.t + plotH} stroke="#e0d9c6" strokeWidth="0.5" strokeDasharray="2 3" />
          ))}

          <rect x={xScale(parseDate("2024-12-01"))} y={M.t} width={xScale(tMax) - xScale(parseDate("2024-12-01"))} height={plotH} fill="#cc7d5c" opacity="0.05" />
          <text x={xScale(parseDate("2025-08-01"))} y={M.t + 16} fontSize="10" fill="#a85c3a" fontFamily="'IBM Plex Mono', monospace" letterSpacing="1.5" textAnchor="middle">
            OPEN-MoE ERA
          </text>

          <polyline
            points={totalFrontier.map((p) => `${xScale(p.date)},${yScale(p.params)}`).join(" ")}
            fill="none" stroke="#2a2a2a" strokeWidth="1.2" strokeDasharray="5 4" opacity="0.45"
          />

          {yTicks.map((t) => (
            <g key={`yt-${t}`}>
              <line x1={M.l - 5} x2={M.l} y1={yScale(t)} y2={yScale(t)} stroke="#2a2a2a" />
              <text x={M.l - 10} y={yScale(t) + 4} fontSize="11" textAnchor="end" fill="#2a2a2a" fontFamily="'IBM Plex Mono', monospace">
                {formatParams(t)}
              </text>
            </g>
          ))}

          {yearTicks.map((y) => {
            const yearStart = parseDate(`${y}-01-01`);
            const yearEnd = parseDate(`${+y + 1}-01-01`);
            const clampedStart = Math.max(yearStart, tMin);
            const clampedEnd = Math.min(yearEnd, tMax);
            const midX = (xScale(clampedStart) + xScale(clampedEnd)) / 2;
            return (
              <text key={`yr-${y}`} x={midX} y={M.t + plotH + 35} fontSize="14" textAnchor="middle" fill="#2a2a2a" fontFamily="'Playfair Display', Georgia, serif" fontStyle="italic">
                {y}
              </text>
            );
          })}

          {quarterTicks.map((d) => (
            <line key={`qt-${d}`} x1={xScale(d)} x2={xScale(d)} y1={M.t + plotH} y2={M.t + plotH + 5} stroke="#2a2a2a" />
          ))}

          <text x={M.l + plotW / 2} y={H - 20} fontSize="12" textAnchor="middle" fill="#2a2a2a" fontFamily="'IBM Plex Mono', monospace" letterSpacing="1">
            RELEASE DATE →
          </text>
          <text x={-H / 2 + 30} y={22} fontSize="12" textAnchor="middle" fill="#2a2a2a" fontFamily="'IBM Plex Mono', monospace" letterSpacing="1" transform="rotate(-90)">
            ← PARAMETERS (log scale)
          </text>

          {MODELS.map((m) => {
            const x = xScale(parseDate(m.date));
            const y = yScale(m.params);
            const color = PROVIDER_COLORS[m.provider];
            const isDense = m.arch === "Dense";
            const isLabeled = LABELED.has(m.name);

            return (
              <g key={m.name}>
                {m.active && m.active < m.params && (
                  <line x1={x} x2={x} y1={y} y2={yScale(m.active)} stroke={color} strokeWidth="1" strokeDasharray="2 2" opacity="0.4" />
                )}
                {m.active && m.active < m.params && (
                  <circle cx={x} cy={yScale(m.active)} r="2.5" fill={color} opacity="0.5" />
                )}
                <circle cx={x} cy={y} r={isLabeled ? 6 : 5} fill={isDense ? color : "#faf6ec"} stroke={color} strokeWidth="1.8" />
                {isLabeled && (
                  <text x={x + 10} y={y - 8} fontSize="10" fill="#2a2a2a" fontFamily="'IBM Plex Mono', monospace">
                    {m.name}
                  </text>
                )}
              </g>
            );
          })}

          <g>
            <line x1={xScale(parseDate("2025-02-27"))} y1={yScale(3000) - 5} x2={xScale(parseDate("2024-08-01"))} y2={yScale(4500)} stroke="#2a2a2a" strokeWidth="0.8" />
            <text x={xScale(parseDate("2024-08-01"))} y={yScale(4500) - 6} fontSize="10" fill="#2a2a2a" fontFamily="'Playfair Display', Georgia, serif" fontStyle="italic" textAnchor="middle">
              "Dense ceiling" ≈ 3T
            </text>
          </g>

          <g>
            <line x1={xScale(parseDate("2025-04-05"))} y1={yScale(109) + 5} x2={xScale(parseDate("2025-08-15"))} y2={yScale(40)} stroke="#2a2a2a" strokeWidth="0.8" />
            <text x={xScale(parseDate("2025-08-15"))} y={yScale(40) + 12} fontSize="10" fill="#2a2a2a" fontFamily="'Playfair Display', Georgia, serif" fontStyle="italic">
              109B total, only 17B active
            </text>
          </g>

          <g>
            <text x={xScale(parseDate("2026-02-15"))} y={yScale(5000) + 14} fontSize="10" fill="#2a2a2a" fontFamily="'Playfair Display', Georgia, serif" fontStyle="italic" textAnchor="middle">
              Frontier plateauing at ~3–4T
            </text>
          </g>
        </svg>

        <div style={styles.legendPanel}>
          <div style={styles.legendSection}>
            <div style={styles.legendTitle}>PROVIDER</div>
            {Object.entries(PROVIDER_COLORS).map(([p, c]) => (
              <div key={p} style={styles.legendRow}>
                <span style={{ ...styles.legendDot, background: c, border: `1px solid ${c}` }} />
                <span style={styles.legendLabel}>{p}</span>
              </div>
            ))}
          </div>

          <div style={styles.legendSection}>
            <div style={styles.legendTitle}>ARCHITECTURE</div>
            <div style={styles.legendRow}>
              <span style={{ ...styles.legendDot, background: "#2a2a2a", border: "1px solid #2a2a2a" }} />
              <span style={styles.legendLabel}>Dense (filled)</span>
            </div>
            <div style={styles.legendRow}>
              <span style={{ ...styles.legendDot, background: "#faf6ec", border: "1.5px solid #2a2a2a" }} />
              <span style={styles.legendLabel}>MoE, total params (ring)</span>
            </div>
            <div style={styles.legendRow}>
              <span style={{ ...styles.legendDot, width: 5, height: 5, background: "#2a2a2a", opacity: 0.5 }} />
              <span style={styles.legendLabel}>MoE active params (tick)</span>
            </div>
          </div>

          <div style={styles.legendSection}>
            <div style={styles.legendTitle}>READING THE CHART</div>
            <p style={styles.legendNote}>
              For MoE models, the thin dashed line links total params (ring) to active
              params per token (tick). A wide gap means the model runs much cheaper at
              inference than its headline size suggests.
            </p>
          </div>
        </div>
      </div>

      <div style={styles.footer}>
        Closed-model parameter counts are best-available public estimates (GPT-4 family, Claude,
        Gemini). Open-weight figures (Llama, DeepSeek, Qwen, GLM, Gemma, Kimi) are official.
        Data as of April 19, 2026.
      </div>
    </div>
  );
}

const styles = {
  root: { minHeight: "100vh", background: "#f4eedd", padding: "32px 24px", fontFamily: "'Inter', system-ui, sans-serif", color: "#2a2a2a", maxWidth: 1180, margin: "0 auto" },
  header: { marginBottom: 24, borderBottom: "2px solid #2a2a2a", paddingBottom: 16 },
  kicker: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 11, letterSpacing: 3, color: "#8a6f3d", marginBottom: 8 },
  title: { fontFamily: "'Playfair Display', Georgia, serif", fontSize: 42, fontWeight: 400, margin: 0, lineHeight: 1.1, color: "#1a1a1a" },
  titleItalic: { fontStyle: "italic", color: "#cc7d5c" },
  subtitle: { marginTop: 12, fontSize: 14, lineHeight: 1.55, color: "#555", maxWidth: 820 },
  chartWrap: { background: "#fffdf7", border: "1.5px solid #2a2a2a", padding: 12, boxShadow: "6px 6px 0 rgba(42,42,42,0.08)", position: "relative" },
  svg: { width: "100%", height: "auto", display: "block" },
  legendPanel: { position: "absolute", top: 80, right: 28, width: 180, fontSize: 11 },
  legendSection: { marginBottom: 18 },
  legendTitle: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 10, letterSpacing: 2, color: "#8a6f3d", marginBottom: 8, borderBottom: "1px solid #d6cfba", paddingBottom: 4 },
  legendRow: { display: "flex", alignItems: "center", gap: 8, marginBottom: 5 },
  legendDot: { width: 10, height: 10, borderRadius: "50%", display: "inline-block", flexShrink: 0 },
  legendLabel: { fontFamily: "'IBM Plex Mono', monospace", fontSize: 10.5, color: "#2a2a2a" },
  legendNote: { fontSize: 10.5, lineHeight: 1.5, color: "#666", fontStyle: "italic", margin: 0 },
  footer: { marginTop: 20, fontSize: 11, color: "#777", fontStyle: "italic", lineHeight: 1.5 },
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<Chart />);
</script>

</body>
</html>
